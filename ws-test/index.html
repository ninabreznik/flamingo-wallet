<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WS Test - Flamingo Wallet</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; padding: 18px; max-width: 900px; }
    #log { white-space: pre-wrap; border: 1px solid #ddd; padding: 10px; height: 300px; overflow: auto; background:#fafafa }
    input, textarea, button { font-size: 14px; margin: 4px 0; }
    .row { display:flex; gap:8px; align-items:center; }
    .row > * { flex:1; }
    button { padding: 8px 10px; }
    h2, h3 { margin-top: 20px; }
    fieldset { margin-top: 20px; border: 1px solid #ccc; padding: 10px; border-radius: 6px; }
    legend { font-weight: bold; }
  </style>
</head>
<body>
  <h1>WebSocket Test UI</h1>

  <div>
    <label>WS URL: <input id="url" value="ws://localhost:8080" style="width:70%" /></label>
    <button id="connect">Connect</button>
    <button id="disconnect" disabled>Disconnect</button>
  </div>

  <hr />

  <div class="row">
    <input id="type" placeholder="type (e.g. getinfo-bitcoin)" />
    <input id="data" placeholder='data as JSON (e.g. {"event":"node-status"})' />
    <button id="send">Send</button>
  </div>

  <div style="margin-top:10px">
    <button id="subscribe-status">Subscribe node-status</button>
    <button id="unsubscribe-status">Unsubscribe</button>
    <button id="resume">Resume (replay persisted)</button>
    <button id="getinfo-bitcoin">Get Bitcoin Info</button>
  </div>

  <hr />
  <h2>⚡ Lightning Node 1</h2>
  <div style="margin-top:10px">
    <button id="getinfo-lightning">Get Lightning Info</button>
  </div>

  <h3>Fund Lightning Node 1</h3>
  <div class="row">
    <button id="new-lightning-address">1. Get New Address</button>
    <input id="funding-address" placeholder="address will appear here" readonly />
  </div>
  <div class="row">
    <input id="funding-blocks" type="number" value="101" placeholder="blocks to generate" />
    <button id="fund-node">2. Fund Address</button>
  </div>
  <div style="margin-top:10px">
    <button id="list-funds">3. Verify Balance (List Funds)</button>
  </div>

  <!-- 🔥 NEW: Lightning Invoice/Payment for Node 1 -->
  <fieldset>
    <legend>⚡ Node 1 Invoices & Payments</legend>

    <div class="row">
      <input id="invoice-amount-node1" type="number" value="5000" placeholder="Amount in sats" />
      <input id="invoice-label-node1" placeholder="Label (optional)" />
      <input id="invoice-desc-node1" placeholder="Description" />
      <button id="create-invoice-node1">Create Invoice</button>
    </div>

    <div class="row">
      <input id="bolt11-node1" placeholder="bolt11 invoice here" />
      <button id="pay-invoice-node1">Pay Invoice</button>
    </div>

    <div class="row">
      <button id="list-invoices-node1">List Invoices</button>
      <button id="list-pays-node1">List Payments</button>
    </div>
  </fieldset>

  <hr />
  <h2>⚡ Lightning Node 2</h2>
  <div style="margin-top:10px">
    <button id="getinfo-lightning2">Get Lightning Info (Node 2)</button>
  </div>

  <h3>Fund Lightning Node 2</h3>
  <div class="row">
    <button id="new-lightning-address2">1. Get New Address</button>
    <input id="funding-address2" placeholder="address will appear here" readonly />
  </div>
  <div class="row">
    <input id="funding-blocks2" type="number" value="101" placeholder="blocks to generate" />
    <button id="fund-node2">2. Fund Address</button>
  </div>
  <div style="margin-top:10px">
    <button id="list-funds2">3. Verify Balance (List Funds)</button>
  </div>

  <!-- 🔥 NEW: Lightning Invoice/Payment for Node 2 -->
  <fieldset>
    <legend>⚡ Node 2 Invoices & Payments</legend>

    <div class="row">
      <input id="invoice-amount-node2" type="number" value="5000" placeholder="Amount in sats" />
      <input id="invoice-label-node2" placeholder="Label (optional)" />
      <input id="invoice-desc-node2" placeholder="Description" />
      <button id="create-invoice-node2">Create Invoice</button>
    </div>

    <div class="row">
      <input id="bolt11-node2" placeholder="bolt11 invoice here" />
      <button id="pay-invoice-node2">Pay Invoice</button>
    </div>

    <div class="row">
      <button id="list-invoices-node2">List Invoices</button>
      <button id="list-pays-node2">List Payments</button>
    </div>
  </fieldset>

  <hr />
  <h2>Peer-to-Peer Actions</h2>
  <div class="row">
    <button id="connect-nodes">1. Connect Node 1 to Node 2</button>
    <button id="list-peers">Verify Peer Connection</button>
  </div>

  <hr />
  <h2>📡 Channel Operations</h2>

  <!-- Node1 -> Node2 -->
  <h3>Open Channel (Node1 → Node2)</h3>
  <div class="row">
    <input id="channel-amount" type="number" value="1000000" placeholder="satoshis" />
    <button id="open-channel">Open Channel (Node1 → Node2)</button>
  </div>

  <!-- Node2 -> Node1 -->
  <h3 style="margin-top:15px">Open Channel (Node2 → Node1)</h3>
  <div class="row">
    <input id="channel-amount2" type="number" value="1000000" placeholder="satoshis" />
    <button id="open-channel2">Open Channel (Node2 → Node1)</button>
  </div>

  <div style="margin-top:15px">
    <button id="list-channels">List Channels</button>
    <button id="list-funds-channel">Verify Channel Funds</button>
  </div>

  <hr />

  <h3>Log</h3>
  <div id="log"></div>

  <script src="app.js"></script>
</body>
</html>
